# App
spring.application.name=liquidity-orchestrator

# PostgreSQL (use your online DB URL here)
spring.datasource.url=jdbc:postgresql://YOUR_DB_HOST:5432/liquidity
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=your-super-secret-key-must-be-at-least-256-bits-long-for-security
jwt.expiration=86400000

# Server port
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:5173